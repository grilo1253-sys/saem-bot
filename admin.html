<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - Saem Celulares</title>
<style>
body { font-family: Arial; padding: 20px; background: #f0f0f0; }
h1 { color: #333; }
textarea { width: 100%; height: 400px; padding: 10px; font-size: 14px; }
button { background: #4CAF50; color: white; padding: 15px 30px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; margin-top: 10px; width: 100%; }
input { width: 100%; padding: 10px; margin: 10px 0; font-size: 16px; }
#msg { color: green; font-weight: bold; margin-top: 10px; }
</style>
</head>
<body>
<h1>🛒 Admin Saem Celulares</h1>
<div id="login">
<p>Senha:</p>
<input type="password" id="senha" placeholder="Digite a senha"/>
<button onclick="entrar()">Entrar</button>
</div>
<div id="painel" style="display:none">
<p>Cole a tabela de preços abaixo:</p>
<textarea id="tabela" placeholder="Cole aqui..."></textarea>
<button onclick="salvar()">💾 Salvar Tabela</button>
<p id="msg"></p>
</div>
<script>
function entrar(){
if(document.getElementById('senha').value==='125320'){
document.getElementById('login').style.display='none';
document.getElementById('painel').style.display='block';
fetch('/tabela').then(r=>r.text()).then(t=>document.getElementById('tabela').value=t);
}else{alert('Senha errada!');}
}
function salvar(){
fetch('/salvar-tabela',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tabela:document.getElementById('tabela').value})})
.then(r=>r.json()).then(()=>document.getElementById('msg').innerText='✅ Tabela salva!');
}
</script>
</body>
</html>
